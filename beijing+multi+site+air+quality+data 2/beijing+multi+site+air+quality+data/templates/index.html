<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Air Quality Prediction System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial, sans-serif;

            background: linear-gradient(
                135deg,
                #74ebd5,
                #ACB6E5
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;
        }

        .container{

            width:500px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{

            text-align:center;

            margin-bottom:10px;

            color:#222;
        }

        .subtitle{

            text-align:center;

            margin-bottom:30px;

            color:#555;

            font-size:18px;
        }

        .input-group{

            margin-bottom:20px;
        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#333;
        }

        input{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:10px;

            font-size:16px;

            outline:none;
        }

        input:focus{

            border-color:#4CAF50;
        }

        button{

            width:100%;

            padding:15px;

            background:#4CAF50;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#45a049;
        }

        .result-box{

            margin-top:30px;

            padding:20px;

            background:#f2f2f2;

            border-left:6px solid #4CAF50;

            border-radius:10px;

            text-align:center;

            font-size:22px;

            font-weight:bold;

            color:#222;
        }

        .footer{

            margin-top:25px;

            text-align:center;

            color:#777;

            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Air Quality Prediction System
        </h1>

        <p class="subtitle">
            PM2.5 Prediction Using Machine Learning
        </p>

        <form action="/predict" method="POST">

            <div class="input-group">

                <label>
                    Temperature (TEMP)
                </label>

                <input type="number"
                       step="any"
                       name="TEMP"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Pressure (PRES)
                </label>

                <input type="number"
                       step="any"
                       name="PRES"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Dew Point (DEWP)
                </label>

                <input type="number"
                       step="any"
                       name="DEWP"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Rainfall (RAIN)
                </label>

                <input type="number"
                       step="any"
                       name="RAIN"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Wind Speed (WSPM)
                </label>

                <input type="number"
                       step="any"
                       name="WSPM"
                       required>

            </div>

            <button type="submit">

                Predict PM2.5

            </button>

        </form>


        {% if prediction_text %}

        <div class="result-box">

            {{ prediction_text }}

        </div>

        {% endif %}


        <div class="footer">

            CMP7005 Programming for Data Analysis

        </div>

    </div>


    <script>

        console.log(
            "Air Quality Prediction System Loaded Successfully"
        );

    </script>

</body>

</html>
